name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Brief summary of the bug.
      placeholder: What went wrong in a few words?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead, in detail. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output here.
      render: shell
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### Environment"

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker (docker compose)
        - Bare metal
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker version
      description: Only if using Docker.
      placeholder: e.g. 27.1.0
    validations:
      required: false

  - type: input
    id: api_version
    attributes:
      label: wireguard-api version or commit
      placeholder: e.g. 0.1.0 or abc1234
    validations:
      required: true
