services:
  wireguard-api:
    build: .
    container_name: wireguard-api
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - /etc/wireguard:/etc/wireguard:rw
    environment:
      WG_API_KEY: ""
      WG_LOG_LEVEL: INFO
      WG_CORS_ORIGINS: "*"
      WG_CONFIG_DIR: /etc/wireguard
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
