services:
  wireguard-api:
    build: .
    container_name: wireguard-api
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "51820:51820/udp"
      - "8000:8000"
    volumes:
      - ./config:/etc/wireguard
    env_file:
      - .env
