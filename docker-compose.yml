services:
  wireguard-api:
    build: .
    container_name: wireguard-api
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - /etc/wireguard:/etc/wireguard:rw
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port ${WG_API_PORT:-8000}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${WG_API_PORT:-8000}/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
